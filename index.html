<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBX Germany – Interview Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    input, textarea, button { font-family: inherit; }
    input[type="date"] { color-scheme: dark; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    textarea { resize: vertical; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useEffect } = React;

    // ── Constants ──────────────────────────────────────────────────────────────

    const STORAGE_KEY = "cbx_interviews_v1";

    const DEFAULT_QUESTIONS = [
      "Was ist der zeitaufwendigste Teil Ihrer Arbeit im Einkauf?",
      "Wo passieren bei Ihnen die meisten Fehler oder Verzögerungen?",
      "Wofür würden Sie sofort Geld ausgeben, wenn es eine Lösung gäbe?",
      "Welche Tools / Software nutzen Sie heute dafür?",
      "Was würde sich ändern, wenn dieses Problem morgen gelöst wäre?",
    ];

    const PIPELINE_STAGES = [
      { id: "open",     label: "Offen",           color: "#64748b", bg: "#1a2236" },
      { id: "called",   label: "Angerufen",        color: "#f59e0b", bg: "#1c1407" },
      { id: "talked",   label: "Gespräch geführt", color: "#3b82f6", bg: "#0c1a2e" },
      { id: "followup", label: "Follow-up",        color: "#a855f7", bg: "#160d22" },
      { id: "done",     label: "Abgeschlossen",    color: "#22c55e", bg: "#071811" },
    ];

    const PAIN_LEVELS = [
      { value: 1, label: "Kein Schmerz",    color: "#64748b" },
      { value: 2, label: "Kleiner Schmerz", color: "#f59e0b" },
      { value: 3, label: "Großer Schmerz",  color: "#ef4444" },
    ];

    const NAV_TABS = ["Pipeline", "Interviews", "Muster", "Einstellungen"];

    function emptyCompany() {
      return {
        id: Math.random().toString(36).slice(2) + Date.now().toString(36),
        company: "", contact: "", role: "", phone: "",
        date: new Date().toISOString().split("T")[0],
        stage: "open", pain: 0, answers: {}, example: "", notes: "",
      };
    }

    // ── Helpers ────────────────────────────────────────────────────────────────

    function bs(bg, extra = {}) {
      return { padding: "9px 16px", background: bg, color: "#fff", border: "none",
        borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 600, ...extra };
    }

    function Card({ children, style = {} }) {
      return <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:12, padding:20, ...style }}>{children}</div>;
    }

    function SL({ children, color = "#64748b" }) {
      return <div style={{ fontSize:10, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color, marginBottom:8 }}>{children}</div>;
    }

    function FI({ value, onChange, placeholder, type = "text" }) {
      return (
        <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
          style={{ width:"100%", background:"#0f172a", border:"1px solid #334155", borderRadius:8,
            padding:"9px 12px", color:"#f1f5f9", fontSize:13, display:"block" }} />
      );
    }

    function FT({ value, onChange, placeholder, rows = 3 }) {
      return (
        <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows}
          style={{ width:"100%", background:"#0f172a", border:"1px solid #334155", borderRadius:8,
            padding:"9px 12px", color:"#f1f5f9", fontSize:13, fontFamily:"inherit", display:"block" }} />
      );
    }

    // ── Export ─────────────────────────────────────────────────────────────────

    function exportCSV(companies, questions) {
      const headers = ["Firma","Ansprechpartner","Rolle","Telefon","Datum","Stage","Schmerzgrad",
        ...questions.map((_,i) => `F${i+1}`),"Beispiel","Notizen"];
      const rows = companies.map(c => [
        c.company, c.contact, c.role, c.phone, c.date,
        PIPELINE_STAGES.find(s => s.id===c.stage)?.label || c.stage,
        PAIN_LEVELS.find(p => p.value===c.pain)?.label || "–",
        ...questions.map((_,i) => c.answers[i] || ""),
        c.example, c.notes,
      ]);
      const csv = [headers,...rows].map(r => r.map(v => `"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"}));
      a.download = "interviews_cbx.csv"; a.click();
    }

    function exportText(companies, questions) {
      const lines = companies.map(c => {
        const stage = PIPELINE_STAGES.find(s => s.id===c.stage)?.label || c.stage;
        const pain  = PAIN_LEVELS.find(p => p.value===c.pain)?.label || "–";
        const qs = questions.map((q,i) => `  F${i+1}: ${q}\n  → ${c.answers[i]||"(keine Antwort)"}`).join("\n\n");
        return `━━━ ${c.company||"Unbekannt"} ━━━\nAnsprechpartner: ${c.contact} (${c.role})\nDatum: ${c.date} | Stage: ${stage} | Schmerz: ${pain}\n\n${qs}\n\nBeispiel: ${c.example||"–"}\nNotizen: ${c.notes||"–"}`;
      }).join("\n\n\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([lines], {type:"text/plain;charset=utf-8;"}));
      a.download = "interviews_cbx.txt"; a.click();
    }

    // ── Header ─────────────────────────────────────────────────────────────────

    function Header({ title, sub }) {
      return (
        <div style={{ borderBottom:"1px solid #1e293b", padding:"16px 20px", position:"sticky", top:0, background:"#0f172a", zIndex:10 }}>
          <div style={{ fontSize:10, color:"#475569", letterSpacing:"0.15em", textTransform:"uppercase" }}>{sub}</div>
          <div style={{ fontSize:18, fontWeight:700, color:"#f1f5f9" }}>{title}</div>
        </div>
      );
    }

    // ── Pipeline ───────────────────────────────────────────────────────────────

    function PipelineView({ companies, onOpen, onAdd }) {
      return (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
            <span style={{ color:"#64748b", fontSize:13 }}>{companies.length} Firmen gesamt</span>
            <button onClick={onAdd} style={bs("#2563eb")}>+ Firma hinzufügen</button>
          </div>
          {PIPELINE_STAGES.map(stage => {
            const items = companies.filter(c => c.stage === stage.id);
            return (
              <div key={stage.id} style={{ marginBottom:16 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                  <div style={{ width:8, height:8, borderRadius:"50%", background:stage.color }} />
                  <span style={{ fontSize:11, fontWeight:700, color:stage.color, textTransform:"uppercase", letterSpacing:"0.1em" }}>
                    {stage.label}
                  </span>
                  <span style={{ fontSize:11, color:"#334155" }}>({items.length})</span>
                </div>
                {items.length === 0 && (
                  <div style={{ padding:"10px 14px", borderRadius:8, border:"1px dashed #1e293b", color:"#334155", fontSize:13 }}>
                    Keine Einträge
                  </div>
                )}
                {items.map(c => {
                  const pain = PAIN_LEVELS.find(p => p.value===c.pain);
                  const answered = Object.values(c.answers).filter(Boolean).length;
                  return (
                    <div key={c.id} onClick={() => onOpen(c.id)}
                      style={{ background:stage.bg, border:`1px solid ${stage.color}33`, borderRadius:10,
                        padding:"12px 16px", marginBottom:6, cursor:"pointer",
                        display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div>
                        <div style={{ fontWeight:600, fontSize:14, color:"#f1f5f9", marginBottom:2 }}>
                          {c.company || <span style={{ color:"#475569" }}>Kein Name</span>}
                        </div>
                        <div style={{ fontSize:12, color:"#64748b" }}>
                          {c.contact||"–"}{c.role ? ` · ${c.role}` : ""} · {c.date}
                        </div>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        {answered > 0 && <span style={{ fontSize:11, color:"#3b82f6" }}>{answered} Antworten</span>}
                        {pain && c.pain > 0 && (
                          <span style={{ fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:20,
                            background:pain.color+"22", color:pain.color }}>{pain.label}</span>
                        )}
                        <span style={{ color:"#475569", fontSize:16 }}>›</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      );
    }

    // ── Interview Form ─────────────────────────────────────────────────────────

    function InterviewForm({ company, questions, onUpdate, onBack, onDelete }) {
      const upd = (field, val) => onUpdate({ ...company, [field]: val });
      const updA = (i, val) => onUpdate({ ...company, answers: { ...company.answers, [i]: val } });

      return (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
            <button onClick={onBack} style={{ background:"none", border:"none", color:"#64748b", cursor:"pointer", fontSize:14, padding:0 }}>
              ← Zurück
            </button>
            <button onClick={() => { if(window.confirm("Firma löschen?")) { onDelete(company.id); onBack(); } }}
              style={{ background:"none", border:"none", color:"#ef444466", cursor:"pointer", fontSize:13 }}>
              Löschen
            </button>
          </div>

          <Card style={{ marginBottom:12 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
              <div style={{ gridColumn:"1/-1" }}>
                <SL>Firma</SL>
                <FI value={company.company} onChange={v=>upd("company",v)} placeholder="Mustermann GmbH" />
              </div>
              {[["Ansprechpartner","contact","Herr Müller"],["Rolle","role","Einkaufsleiter"],["Telefon","phone","+49 ..."]].map(([l,f,ph]) => (
                <div key={f}><SL>{l}</SL><FI value={company[f]} onChange={v=>upd(f,v)} placeholder={ph} /></div>
              ))}
              <div><SL>Datum</SL><FI type="date" value={company.date} onChange={v=>upd("date",v)} placeholder="" /></div>
            </div>
          </Card>

          <Card style={{ marginBottom:12 }}>
            <div style={{ marginBottom:14 }}>
              <SL>Pipeline Stage</SL>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {PIPELINE_STAGES.map(s => (
                  <button key={s.id} onClick={() => upd("stage",s.id)} style={{
                    padding:"7px 12px", borderRadius:8, border:"1px solid",
                    borderColor: company.stage===s.id ? s.color : "#334155",
                    background: company.stage===s.id ? s.color+"22" : "transparent",
                    color: company.stage===s.id ? s.color : "#64748b",
                    cursor:"pointer", fontSize:12, fontWeight:600,
                  }}>{s.label}</button>
                ))}
              </div>
            </div>
            <div>
              <SL>Schmerzgrad</SL>
              <div style={{ display:"flex", gap:6 }}>
                {PAIN_LEVELS.map(p => (
                  <button key={p.value} onClick={() => upd("pain",p.value)} style={{
                    flex:1, padding:"7px 4px", borderRadius:8, border:"1px solid",
                    borderColor: company.pain===p.value ? p.color : "#334155",
                    background: company.pain===p.value ? p.color+"22" : "transparent",
                    color: company.pain===p.value ? p.color : "#64748b",
                    cursor:"pointer", fontSize:11, fontWeight:600,
                  }}>{p.label}</button>
                ))}
              </div>
            </div>
          </Card>

          {questions.map((q,i) => (
            <Card key={i} style={{ marginBottom:10 }}>
              <SL color="#3b82f6">Frage {i+1}</SL>
              <div style={{ fontSize:13, color:"#94a3b8", fontStyle:"italic", marginBottom:10 }}>„{q}"</div>
              <FT value={company.answers[i]||""} onChange={v=>updA(i,v)} placeholder="Antwort..." />
            </Card>
          ))}

          <Card style={{ marginBottom:10 }}>
            <SL color="#f59e0b">Konkretes Beispiel</SL>
            <div style={{ fontSize:13, color:"#94a3b8", fontStyle:"italic", marginBottom:10 }}>
              „Können Sie mir ein Beispiel nennen, wo das zuletzt ein Problem war?"
            </div>
            <FT value={company.example} onChange={v=>upd("example",v)} placeholder="Konkretes Beispiel..." />
          </Card>

          <Card style={{ marginBottom:20 }}>
            <SL>Eigene Notizen</SL>
            <FT value={company.notes} onChange={v=>upd("notes",v)} placeholder="Bauchgefühl, nächste Schritte..." />
          </Card>

          <button onClick={onBack} style={bs("#2563eb", { width:"100%", padding:14, fontSize:15 })}>
            Speichern & zurück
          </button>
        </div>
      );
    }

    // ── Muster ─────────────────────────────────────────────────────────────────

    function PatternView({ companies, questions }) {
      const interviewed = companies.filter(c => ["talked","followup","done"].includes(c.stage));
      if (companies.length === 0) return (
        <div style={{ textAlign:"center", padding:"60px 0", color:"#334155" }}>
          <div style={{ fontSize:40, marginBottom:12 }}>📊</div>
          <div style={{ fontSize:14 }}>Noch keine Daten. Füge Firmen hinzu und führe Interviews durch.</div>
        </div>
      );
      return (
        <div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:16 }}>
            {[
              { label:"Firmen total",      value:companies.length,                        color:"#f1f5f9" },
              { label:"Gespräche geführt", value:interviewed.length,                      color:"#3b82f6" },
              { label:"Großer Schmerz",    value:companies.filter(c=>c.pain===3).length,  color:"#ef4444" },
            ].map((s,i) => (
              <Card key={i} style={{ textAlign:"center", padding:"14px 8px" }}>
                <div style={{ fontSize:28, fontWeight:800, color:s.color }}>{s.value}</div>
                <div style={{ fontSize:11, color:"#64748b", marginTop:4 }}>{s.label}</div>
              </Card>
            ))}
          </div>

          <Card style={{ marginBottom:14 }}>
            <SL>Pipeline Übersicht</SL>
            {PIPELINE_STAGES.map(s => {
              const count = companies.filter(c=>c.stage===s.id).length;
              return (
                <div key={s.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                  <div style={{ width:90, fontSize:12, color:s.color, fontWeight:600 }}>{s.label}</div>
                  <div style={{ flex:1, background:"#0f172a", borderRadius:4, height:8, overflow:"hidden" }}>
                    <div style={{ height:"100%", borderRadius:4, background:s.color,
                      width: companies.length ? `${(count/companies.length)*100}%` : "0%", transition:"width 0.5s" }} />
                  </div>
                  <div style={{ width:20, fontSize:12, color:"#64748b", textAlign:"right" }}>{count}</div>
                </div>
              );
            })}
          </Card>

          <Card style={{ marginBottom:14 }}>
            <SL>Schmerzverteilung</SL>
            {PAIN_LEVELS.map(p => {
              const count = companies.filter(c=>c.pain===p.value).length;
              return (
                <div key={p.value} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                  <div style={{ width:120, fontSize:12, color:p.color, fontWeight:600 }}>{p.label}</div>
                  <div style={{ flex:1, background:"#0f172a", borderRadius:4, height:8, overflow:"hidden" }}>
                    <div style={{ height:"100%", borderRadius:4, background:p.color,
                      width: companies.length ? `${(count/companies.length)*100}%` : "0%", transition:"width 0.5s" }} />
                  </div>
                  <div style={{ width:20, fontSize:12, color:"#64748b", textAlign:"right" }}>{count}</div>
                </div>
              );
            })}
          </Card>

          {questions.map((q,i) => {
            const answers = companies.map(c => ({ text:c.answers[i], co:c.company })).filter(a=>a.text);
            if (!answers.length) return null;
            return (
              <Card key={i} style={{ marginBottom:12 }}>
                <SL color="#3b82f6">Frage {i+1} – {answers.length} Antworten</SL>
                <div style={{ fontSize:13, color:"#94a3b8", fontStyle:"italic", marginBottom:10 }}>„{q}"</div>
                {answers.map((a,j) => (
                  <div key={j} style={{ borderLeft:"2px solid #334155", paddingLeft:12, marginBottom:10 }}>
                    <div style={{ fontSize:11, color:"#475569", marginBottom:3 }}>{a.co||"–"}</div>
                    <div style={{ fontSize:13, color:"#cbd5e1", lineHeight:1.6 }}>{a.text}</div>
                  </div>
                ))}
              </Card>
            );
          })}

          {companies.some(c=>c.example) && (
            <Card>
              <SL color="#f59e0b">Konkrete Beispiele</SL>
              {companies.filter(c=>c.example).map(c => (
                <div key={c.id} style={{ marginBottom:12 }}>
                  <div style={{ fontSize:11, color:"#64748b", marginBottom:4 }}>{c.company}</div>
                  <div style={{ borderLeft:"2px solid #f59e0b44", paddingLeft:12, fontSize:13, color:"#cbd5e1", lineHeight:1.6 }}>
                    {c.example}
                  </div>
                </div>
              ))}
            </Card>
          )}
        </div>
      );
    }

    // ── Einstellungen ──────────────────────────────────────────────────────────

    function SettingsView({ questions, setQuestions, companies, onExportCSV, onExportText }) {
      const [newQ, setNewQ] = useState("");
      return (
        <div>
          <Card style={{ marginBottom:14 }}>
            <SL>Fragen verwalten</SL>
            {questions.map((q,i) => (
              <div key={i} style={{ display:"flex", gap:8, marginBottom:8, alignItems:"center" }}>
                <div style={{ fontSize:11, color:"#3b82f6", fontWeight:700, minWidth:22 }}>F{i+1}</div>
                <input value={q} onChange={e => { const u=[...questions]; u[i]=e.target.value; setQuestions(u); }}
                  style={{ flex:1, background:"#0f172a", border:"1px solid #334155", borderRadius:8,
                    padding:"8px 12px", color:"#f1f5f9", fontSize:13, fontFamily:"inherit" }} />
                {questions.length > 1 && (
                  <button onClick={() => setQuestions(questions.filter((_,j)=>j!==i))}
                    style={{ background:"none", border:"none", color:"#ef444466", cursor:"pointer", fontSize:20 }}>×</button>
                )}
              </div>
            ))}
            <div style={{ display:"flex", gap:8, marginTop:10 }}>
              <input value={newQ} onChange={e => setNewQ(e.target.value)} placeholder="Neue Frage..."
                onKeyDown={e => { if(e.key==="Enter"&&newQ.trim()){ setQuestions([...questions,newQ.trim()]); setNewQ(""); }}}
                style={{ flex:1, background:"#0f172a", border:"1px solid #334155", borderRadius:8,
                  padding:"8px 12px", color:"#f1f5f9", fontSize:13, fontFamily:"inherit" }} />
              <button onClick={() => { if(newQ.trim()){ setQuestions([...questions,newQ.trim()]); setNewQ(""); }}}
                style={bs("#2563eb")}>+ Hinzufügen</button>
            </div>
          </Card>

          <Card style={{ marginBottom:14 }}>
            <SL>Export</SL>
            <div style={{ display:"flex", gap:10, marginBottom:10 }}>
              <button onClick={onExportCSV} style={bs("#059669", { flex:1 })}>📊 CSV / Excel</button>
              <button onClick={onExportText} style={bs("#7c3aed", { flex:1 })}>📄 Text-Export</button>
            </div>
            <div style={{ fontSize:12, color:"#475569" }}>
              CSV öffnest du direkt in Excel. Text-Export zum Copy-Paste in Claude zur Analyse.
            </div>
          </Card>

          <Card>
            <SL color="#ef4444">Daten zurücksetzen</SL>
            <div style={{ fontSize:13, color:"#64748b", marginBottom:12 }}>
              Löscht alle Firmen und Interviews dauerhaft. Nicht rückgängig machbar.
            </div>
            <button onClick={() => {
              if(window.confirm("Wirklich alle Daten löschen? Das kann nicht rückgängig gemacht werden.")) {
                localStorage.removeItem(STORAGE_KEY);
                window.location.reload();
              }
            }} style={bs("#7f1d1d", { background:"#7f1d1d22", color:"#ef4444", border:"1px solid #ef444433" })}>
              Alle Daten löschen
            </button>
          </Card>
        </div>
      );
    }

    // ── App ────────────────────────────────────────────────────────────────────

    function App() {
      const [nav, setNav] = useState(0);
      const [companies, setCompanies] = useState([]);
      const [questions, setQuestions] = useState(DEFAULT_QUESTIONS);
      const [editId, setEditId] = useState(null);
      const [loaded, setLoaded] = useState(false);

      // Load from localStorage
      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const data = JSON.parse(raw);
            if (data.companies) setCompanies(data.companies);
            if (data.questions) setQuestions(data.questions);
          }
        } catch(e) {}
        setLoaded(true);
      }, []);

      // Save to localStorage on every change
      useEffect(() => {
        if (!loaded) return;
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ companies, questions }));
        } catch(e) {}
      }, [companies, questions, loaded]);

      const editCompany = companies.find(c => c.id === editId);

      const addCompany = () => {
        const c = emptyCompany();
        setCompanies(prev => [...prev, c]);
        setEditId(c.id);
      };

      const updateCompany = useCallback(updated => {
        setCompanies(prev => prev.map(c => c.id===updated.id ? updated : c));
      }, []);

      const deleteCompany = useCallback(id => {
        setCompanies(prev => prev.filter(c => c.id!==id));
        setEditId(null);
      }, []);

      if (!loaded) return <div style={{ padding:40, color:"#64748b", textAlign:"center" }}>Lade...</div>;

      if (editId && editCompany) {
        return (
          <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column" }}>
            <Header title={editCompany.company || "Neue Firma"} sub="Interview bearbeiten" />
            <div style={{ flex:1, overflowY:"auto", padding:"20px 16px", maxWidth:720, width:"100%", margin:"0 auto" }}>
              <InterviewForm
                company={editCompany} questions={questions}
                onUpdate={updateCompany} onBack={() => setEditId(null)} onDelete={deleteCompany}
              />
            </div>
          </div>
        );
      }

      return (
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column" }}>
          <Header title="CBX Germany" sub="Interview Tracker" />
          <div style={{ display:"flex", borderBottom:"1px solid #1e293b", position:"sticky", top:57, background:"#0f172a", zIndex:9 }}>
            {NAV_TABS.map((label,i) => (
              <button key={i} onClick={() => setNav(i)} style={{
                flex:1, padding:"12px 4px", background:"none", border:"none",
                borderBottom: nav===i ? "2px solid #3b82f6" : "2px solid transparent",
                color: nav===i ? "#3b82f6" : "#64748b",
                cursor:"pointer", fontSize:12, fontWeight:600,
              }}>{label}</button>
            ))}
          </div>
          <div style={{ flex:1, overflowY:"auto", padding:"20px 16px", maxWidth:720, width:"100%", margin:"0 auto" }}>
            {nav===0 && <PipelineView companies={companies} onOpen={setEditId} onAdd={addCompany} />}
            {nav===1 && (
              <div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                  <span style={{ color:"#64748b", fontSize:13 }}>{companies.length} Einträge</span>
                  <button onClick={addCompany} style={bs("#2563eb")}>+ Firma hinzufügen</button>
                </div>
                {companies.length===0 ? (
                  <div style={{ textAlign:"center", padding:"60px 0" }}>
                    <div style={{ fontSize:40, marginBottom:12 }}>📞</div>
                    <div style={{ fontSize:14, color:"#475569" }}>Ruf jetzt an. 3 Firmen. Dann zurück.</div>
                  </div>
                ) : companies.map(c => {
                  const pain = PAIN_LEVELS.find(p => p.value===c.pain);
                  const stage = PIPELINE_STAGES.find(s => s.id===c.stage);
                  const answered = Object.values(c.answers).filter(Boolean).length;
                  return (
                    <div key={c.id} onClick={() => setEditId(c.id)}
                      style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:10,
                        padding:"14px 16px", marginBottom:8, cursor:"pointer",
                        display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div>
                        <div style={{ fontWeight:600, fontSize:14, color:"#f1f5f9", marginBottom:3 }}>
                          {c.company || <span style={{ color:"#475569" }}>Kein Name</span>}
                        </div>
                        <div style={{ fontSize:12, color:"#64748b" }}>{c.contact||"–"} · {c.date}</div>
                      </div>
                      <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                        {stage && <span style={{ fontSize:11, color:stage.color, fontWeight:600 }}>{stage.label}</span>}
                        {pain && c.pain>0 && (
                          <span style={{ fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:20,
                            background:pain.color+"22", color:pain.color }}>{pain.label}</span>
                        )}
                        {answered>0 && <span style={{ fontSize:11, color:"#475569" }}>{answered}A</span>}
                        <span style={{ color:"#475569", fontSize:16 }}>›</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {nav===2 && <PatternView companies={companies} questions={questions} />}
            {nav===3 && (
              <SettingsView
                questions={questions} setQuestions={setQuestions} companies={companies}
                onExportCSV={() => exportCSV(companies, questions)}
                onExportText={() => exportText(companies, questions)}
              />
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
